global:
  scrape_interval: 15s
scrape_configs:
  - job_name: 'kafka'
    static_configs:
      - targets: ['kafka:9092']
  - job_name: 'spark'
    static_configs:
      - targets: ['spark-master:8080']
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres:5432']
  - job_name: 'neo4j'
    static_configs:
      - targets: ['neo4j:7474']
  - job_name: 'airflow'
    static_configs:
      - targets: ['airflow-webserver:8080']
